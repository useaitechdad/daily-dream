<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mii Designer — Daily Dream</title>
  <meta name="description" content="Create adorable chibi characters with custom outfits, hairstyles, and expressive faces." />

  <!-- Google Fonts: Nunito with display=swap -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>✨ Mii Designer</h1>
    <p class="app-subtitle">Create your character!</p>
  </header>

  <main class="app-layout">
    <!-- ============ CONTROLS PANEL ============ -->
    <aside class="controls-panel" id="controls-panel">

      <!-- Identity -->
      <details class="control-section" open>
        <summary class="section-title">👤 Identity</summary>
        <div class="section-body">
          <label class="control-label" for="mii-name">Name</label>
          <input type="text" id="mii-name" class="control-input" maxlength="20" placeholder="Give your Mii a name…" autocomplete="off" />

          <label class="control-label slider-label">
            Introvert
            <input type="range" id="slider-introvert-extrovert" min="0" max="100" value="50" class="control-slider" />
            Extrovert
          </label>

          <label class="control-label slider-label">
            Calm
            <input type="range" id="slider-calm-intense" min="0" max="100" value="50" class="control-slider" />
            Intense
          </label>

          <label class="control-label slider-label">
            Serious
            <input type="range" id="slider-serious-silly" min="0" max="100" value="50" class="control-slider" />
            Silly
          </label>


        </div>
      </details>

      <!-- Body -->
      <details class="control-section" open>
        <summary class="section-title">🧍 Body</summary>
        <div class="section-body">
          <label class="control-label">Skin Tone</label>
          <div class="swatch-row" id="skin-tone-swatches" role="radiogroup" aria-label="Skin tone"></div>

          <label class="control-label">Body Shape</label>
          <div class="shape-row" id="body-shape-row">
            <button type="button" class="shape-btn" data-shape="narrow" aria-label="Narrow body">
              <svg viewBox="0 0 32 48" width="32" height="48"><rect x="10" y="8" width="12" height="32" rx="6" fill="currentColor"/></svg>
            </button>
            <button type="button" class="shape-btn" data-shape="regular" aria-label="Regular body">
              <svg viewBox="0 0 32 48" width="32" height="48"><rect x="6" y="8" width="20" height="32" rx="8" fill="currentColor"/></svg>
            </button>
            <button type="button" class="shape-btn" data-shape="stocky" aria-label="Stocky body">
              <svg viewBox="0 0 32 48" width="32" height="48"><rect x="2" y="8" width="28" height="32" rx="10" fill="currentColor"/></svg>
            </button>
          </div>
        </div>
      </details>

      <!-- Outfit -->
      <details class="control-section" open>
        <summary class="section-title">👕 Outfit</summary>
        <div class="section-body">
          <label class="control-label" for="outfit-style">Style</label>
          <select id="outfit-style" class="control-select">
            <option value="tshirt">T-shirt</option>
            <option value="hoodie">Hoodie</option>
            <option value="dress">Dress</option>
            <option value="stripes">Striped Top</option>
            <option value="jacket">Jacket</option>
            <option value="overalls">Overalls</option>
            <option value="suit">Suit</option>
            <option value="cape">Cape</option>
            <option value="tanktop">Tank Top</option>
            <option value="kimono">Kimono</option>
          </select>

          <label class="control-label" for="outfit-primary-color">Primary Color</label>
          <input type="color" id="outfit-primary-color" class="control-color" value="#5B8CDE" />

          <div id="secondary-color-row">
            <label class="control-label" for="outfit-secondary-color">Secondary Color</label>
            <input type="color" id="outfit-secondary-color" class="control-color" value="#3A6DB5" />
          </div>
        </div>
      </details>

      <!-- Accessory -->
      <details class="control-section" open>
        <summary class="section-title">🎀 Accessory</summary>
        <div class="section-body">
          <div class="accessory-row" id="accessory-row" role="radiogroup" aria-label="Accessory">
            <button type="button" class="accessory-btn" data-accessory="none" aria-label="No accessory">None</button>
            <button type="button" class="accessory-btn" data-accessory="glasses" aria-label="Glasses">🤓</button>
            <button type="button" class="accessory-btn" data-accessory="hat" aria-label="Hat">🎩</button>
            <button type="button" class="accessory-btn" data-accessory="bow" aria-label="Bow">🎀</button>
            <button type="button" class="accessory-btn" data-accessory="headphones" aria-label="Headphones">🎧</button>
            <button type="button" class="accessory-btn" data-accessory="sunglasses" aria-label="Sunglasses">🕶️</button>
            <button type="button" class="accessory-btn" data-accessory="crown" aria-label="Crown">👑</button>
            <button type="button" class="accessory-btn" data-accessory="bandana" aria-label="Bandana">🏴‍☠️</button>
            <button type="button" class="accessory-btn" data-accessory="earrings" aria-label="Earrings">💎</button>
            <button type="button" class="accessory-btn" data-accessory="mask" aria-label="Mask">😷</button>
            <button type="button" class="accessory-btn" data-accessory="horns" aria-label="Horns">😈</button>
          </div>
        </div>
      </details>

      <!-- Face -->
      <details class="control-section" open>
        <summary class="section-title">😊 Face</summary>
        <div class="section-body">

          <button type="button" id="btn-randomize-face" class="btn btn--primary btn--large btn--full">🎲 Randomize Face</button>

          <label class="control-label">Face Shape</label>
          <div class="thumb-row" id="face-shape-row" role="radiogroup" aria-label="Face shape">
            <!-- JS-generated SVG thumbnail buttons -->
          </div>

          <label class="control-label">Hair Style</label>
          <div class="thumb-row" id="hair-style-row" role="radiogroup" aria-label="Hair style">
            <!-- JS-generated SVG thumbnail buttons -->
          </div>

          <label class="control-label" for="hair-color">Hair Color</label>
          <input type="color" id="hair-color" class="control-color" value="#3B2416" />

          <label class="control-label">Eye Shape</label>
          <div class="thumb-row" id="eye-shape-row" role="radiogroup" aria-label="Eye shape">
            <!-- JS-generated SVG thumbnail buttons -->
          </div>

          <label class="control-label" for="eye-color">Eye Color</label>
          <input type="color" id="eye-color" class="control-color" value="#2D1810" />

          <label class="control-label">Mouth</label>
          <div class="thumb-row" id="mouth-shape-row" role="radiogroup" aria-label="Mouth shape">
            <!-- JS-generated SVG thumbnail buttons -->
          </div>

          <label class="control-label" for="eyebrow-style">Eyebrows</label>
          <select id="eyebrow-style" class="control-select">
            <option value="none">None</option>
            <option value="arched">Arched</option>
            <option value="flat">Flat</option>
            <option value="angry">Angry</option>
            <option value="worried">Worried</option>
            <option value="thick">Thick</option>
            <option value="thin">Thin</option>
          </select>

          <label class="control-label" for="nose-style">Nose</label>
          <select id="nose-style" class="control-select">
            <option value="none">None</option>
            <option value="dot">Dot</option>
            <option value="triangle">Triangle</option>
            <option value="round">Round</option>
            <option value="button">Button</option>
          </select>

          <label class="control-label" for="expression-style">Expression Effect</label>
          <select id="expression-style" class="control-select">
            <option value="none">None</option>
            <option value="sweatDrop">💧 Sweat Drop</option>
            <option value="angerVein">💢 Anger Vein</option>
            <option value="sparkle">✨ Sparkle</option>
            <option value="blushLines">😊 Blush Lines</option>
            <option value="tears">😢 Tears</option>
          </select>

          <div class="toggle-row">
            <label class="toggle-label" for="face-blush">
              <input type="checkbox" id="face-blush" />
              Blush
            </label>
            <label class="toggle-label" for="face-freckles">
              <input type="checkbox" id="face-freckles" />
              Freckles
            </label>
          </div>

          <div class="toggle-row">
            <label class="toggle-label" for="face-eyelashes">
              <input type="checkbox" id="face-eyelashes" />
              Eyelashes
            </label>
            <label class="toggle-label" for="face-beauty-mark">
              <input type="checkbox" id="face-beauty-mark" />
              Beauty Mark
            </label>
            <label class="toggle-label" for="face-scar">
              <input type="checkbox" id="face-scar" />
              Scar
            </label>
          </div>

        </div>
      </details>

      <!-- Personality & Voice -->
      <details class="control-section" open>
        <summary class="section-title">🎭 Personality & Voice</summary>
        <div class="section-body">
          <label class="control-label" for="meta-voice">Voice</label>
          <select id="meta-voice" class="control-select">
            <option value="Aoede">Aoede</option>
            <option value="Puck">Puck</option>
            <option value="Charon">Charon</option>
            <option value="Kore">Kore</option>
            <option value="Fenrir">Fenrir</option>
          </select>
          <label class="control-label" for="meta-notes">Additional Quirks / Context</label>
          <textarea id="meta-notes" class="control-textarea" rows="3" placeholder="e.g. You are a pirate who loves cheese..."></textarea>
        </div>
      </details>

    </aside>

    <!-- ============ PREVIEW PANEL ============ -->
    <section class="preview-panel" id="preview-panel">
      <div class="preview-card">
        <div class="preview-mii" id="mii-preview-container" aria-label="Mii character preview">
          <!-- SVG rendered here by JS -->
        </div>
        <p class="preview-name" id="preview-name">Example</p>
      </div>

      <div class="action-bar">
        <button type="button" id="btn-save" class="btn btn--primary">💾 Save</button>
        <button type="button" id="btn-export-one" class="btn btn--secondary">📤 Export</button>
        <button type="button" id="btn-new" class="btn btn--secondary">✨ New Mii</button>
      </div>

      <div class="gallery-section">
        <div class="gallery-header">
          <h2 class="gallery-title">Your Miis</h2>
          <div class="gallery-actions">
            <button type="button" id="btn-export-all" class="btn btn--small btn--secondary">Export All</button>
            <label class="btn btn--small btn--ghost import-label" for="btn-import">Import</label>
            <input type="file" id="btn-import" accept=".json" hidden />
          </div>
        </div>
        <div id="gallery-grid" class="gallery-grid">
          <p class="gallery-empty" id="gallery-empty">No saved Miis yet. Create one and hit Save!</p>
        </div>
        <div style="margin-top: 16px; text-align: center;">
          <button type="button" id="btn-open-dialogue" class="btn btn--primary btn--large">💬 Open Dialogue Mode</button>
        </div>
      </div>
    </section>

    <!-- ============ DIALOGUE STAGE (HIDDEN) ============ -->
    <div id="dialogue-overlay" class="dialogue-overlay hidden">
      <div class="dialogue-modal">
        <div class="dialogue-header">
          <h2>💬 Mii Dialogue Stage</h2>
          <button type="button" id="btn-close-dialogue" class="btn-close">×</button>
        </div>
        
        <div class="dialogue-setup" id="dialogue-setup">
          <div class="dialogue-selectors">
            <div class="dialogue-selector">
              <label>Mii 1</label>
              <select id="dialogue-mii-1" class="control-select"></select>
            </div>
            <div class="dialogue-selector">
              <label>Mii 2</label>
              <select id="dialogue-mii-2" class="control-select"></select>
            </div>
          </div>
          <label class="control-label">Topic / Context</label>
          <input type="text" id="dialogue-topic" class="control-input" value="Introduce yourselves!" />
          <button type="button" id="btn-start-dialogue" class="btn btn--primary btn--large" style="margin-top: 16px; width: 100%;">🎙️ Start Conversation</button>
        </div>

        <p id="dialogue-status" style="text-align: center; font-size: 14px; margin-top: 8px; margin-bottom: 16px; color: var(--text-muted);"></p>

        <div class="dialogue-theater hidden" id="dialogue-theater">
          <div class="theater-stage">
            <div class="theater-character">
              <div id="theater-mii-1" class="theater-mii"></div>
              <div id="theater-bubble-1" class="speech-bubble hidden"></div>
            </div>
            <div class="theater-character">
              <div id="theater-mii-2" class="theater-mii"></div>
              <div id="theater-bubble-2" class="speech-bubble hidden"></div>
            </div>
          </div>
          <button type="button" id="btn-stop-dialogue" class="btn btn--secondary btn--full" style="margin-top: 16px;">🛑 Stop Conversation</button>
        </div>
      </div>
    </div>
  </main>

  <!--
    Load as a regular script, not type="module", so the app works
    when opened via file:// (double-click). ES modules are blocked
    on that protocol by browser CORS policy.
    app.js is a generated IIFE bundle — see main.js + lib/*.js for canonical sources.
  -->
  <script src="app.js"></script>
</body>
</html>
